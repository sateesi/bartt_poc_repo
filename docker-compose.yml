# BARTT Local Development Stack (INVOKE_MODE=local)
#
# Both barttagent (backend) and barttuiapp (UI) run as local Docker containers.
# The UI calls the local backend directly via the Docker bridge network.
#
# Prerequisites:
#   - Docker Desktop running
#   - AWS credentials in agentcore/.env.local  (refresh with `agentcore dev`)
#
# Usage:
#   docker compose up --build          # build & start both services
#   docker compose up barttuiapp       # start UI only (backend already running)
#   docker compose down                # stop & remove containers
#
# ── AWS mode ──────────────────────────────────────────────────────────────────
# To connect the UI to the DEPLOYED AgentCore runtime on AWS instead, use:
#   docker compose -f docker-compose.aws.yml up --build
# This skips the local barttagent container entirely.
# ─────────────────────────────────────────────────────────────────────────────
#
# Services:
#   barttagent  → http://localhost:8080  (Bedrock AgentCore runtime)
#   barttuiapp  → http://localhost:8501  (Streamlit chat UI)

services:

  barttagent:
    build:
      context: ./app/barttagent
      dockerfile: Dockerfile
    image: barttagent:local
    container_name: barttagent
    ports:
      - "8080:8080"
    # Load AWS credentials + model config from the existing local dev env file.
    # agentcore/.env.local is created by `agentcore dev` and holds temporary
    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN values.
    env_file:
      - ./agentcore/.env.local
    environment:
      # Tell the AgentCore SDK to use .env.local credentials instead of
      # the managed identity service (required for local development).
      LOCAL_DEV: "1"
    # Override the Dockerfile CMD to skip OpenTelemetry instrumentation
    # locally (avoids noise when no OTLP collector is running).
    command: ["python", "-m", "main"]
    restart: unless-stopped
    networks:
      - bartt-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  barttuiapp:
    build:
      context: ./barttuiapp
      dockerfile: Dockerfile
    image: barttuiapp:local
    container_name: barttuiapp
    ports:
      - "8501:8501"
    environment:
      # Service name 'barttagent' resolves via the Docker bridge network
      AGENT_URL: "http://barttagent:8080"
      INVOKE_PATH: "/invocations"
    depends_on:
      - barttagent
    restart: unless-stopped
    networks:
      - bartt-net

networks:
  bartt-net:
    driver: bridge
